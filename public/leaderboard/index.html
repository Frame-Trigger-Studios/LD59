<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <title>Link Drop Leaderboards</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        padding: 20px;
        text-align: center;
    }
    h1 { margin-bottom: 10px; }
    .levels {
        margin-bottom: 20px;
    }
    .levels button {
        margin: 4px;
        padding: 8px 14px;
        background: #333;
        color: #eee;
        border: 1px solid #555;
        cursor: pointer;
        border-radius: 4px;
    }
    .levels button:hover {
        background: #555;
    }
    table {
        margin: 0 auto;
        width: 300px;
        border-collapse: collapse;
        margin-top: 10px;
    }
    th, td {
        border: 1px solid #444;
        padding: 6px;
        text-align: left;
    }
    th {
        background: #222;
    }
    .section {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 6px;
}
    #allContainer {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
    margin-top: 30px;
    padding: 0 20px;
}
</style>
</head>
<body>

<h1>Link Drop Leaderboards</h1>

<div class="levels">
    <strong>Select Level:</strong><br>

    <!-- Level buttons -->
    <script>
        for (let i = 1; i <= 10; i++) {
            document.write(`<button onclick="loadLevel(${i})">Level ${i}</button>`);
        }
    </script>

    <button onclick="loadAllLevels()">All Levels</button>
</div>

<!-- Single-level title + table -->
<h2 id="levelTitle">Level —</h2>

<div id="singleContainer">
    <table id="table" style="display:none;">
        <thead>
            <tr><th>Name</th><th>Score</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>


<div id="allContainer"></div>

<script>
async function loadLevel(level) {
    document.getElementById("allContainer").innerHTML = "";

    document.getElementById("levelTitle").textContent = `Level ${level}`;
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";
    document.getElementById("table").style.display = "none";

    try {
        const res = await fetch(`https://quackqack.pythonanywhere.com/leaderboard?level=${level}`);
        const data = await res.json();

        data.forEach(entry => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${entry.name.toUpperCase()}</td>
                <td>${Number(entry.score).toFixed(2)}</td>
            `;
            tbody.appendChild(row);
        });

        document.getElementById("table").style.display = "table";
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="2">Network error</td></tr>`;
        document.getElementById("table").style.display = "table";
    }
}

async function loadAllLevels() {
    const container = document.getElementById("allContainer");
    container.innerHTML = "";
    document.getElementById("levelTitle").textContent = "All Levels";
    document.getElementById("table").style.display = "none";

    for (let level = 1; level <= 10; level++) {
        const section = document.createElement("div");
        section.className = "section";

        section.innerHTML = `<h2>Level ${level}</h2>`;

        const table = document.createElement("table");
        const tbody = document.createElement("tbody");

        table.innerHTML = `
            <thead>
                <tr><th>Name</th><th>Score</th></tr>
            </thead>
        `;
        table.appendChild(tbody);

        try {
            const res = await fetch(`https://quackqack.pythonanywhere.com/leaderboard?level=${level}`);
            const data = await res.json();

            data.forEach(entry => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${entry.name.toUpperCase()}</td>
                    <td>${Number(entry.score).toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            });
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="2">Error loading</td></tr>`;
        }

        section.appendChild(table);
        container.appendChild(section);
    }
}

// Auto-load all levels
window.onload = () => loadAllLevels();
</script>

</body>
</html>
